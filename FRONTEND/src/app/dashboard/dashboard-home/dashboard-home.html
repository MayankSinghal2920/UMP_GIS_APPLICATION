<div class="dashboard-page">

  <!-- ================= MAIN CARDS ================= -->
  <div class="main-cards">
    <div
      class="main-card"
      *ngFor="let card of mainCards"
      [attr.data-color]="card.color"
      [class.active]="selectedMain === card.key"
      (click)="onMainCardClick(card.key)"
    >
      <div class="main-title">{{ card.title }}</div>
      <div class="main-value">{{ card.value }}</div>
    </div>
  </div>

  <!-- ================= SUB CARDS ================= -->
<div class="sub-cards">
  <div
    class="sub-card"
    *ngFor="let card of activeSubCards"
    [attr.data-color]="activeColor"
    (click)="onSubCardClick(card)"
  >
    <div class="sub-title">{{ card.title }}</div>
    <div class="sub-value">{{ card.value }}</div>
  </div>
</div>

<div class="dashboard-note">
  <span class="note-icon">ℹ️</span>
  Only relevant asset cards will be active for redirection based on the logged-in user role (Maker / Checker / Approver).
</div>

</div>
