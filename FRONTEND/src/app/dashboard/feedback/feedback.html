<div class="feedback-page">

  <div class="container-fluid">

    <div class="page-header text-center">
      <h2>User Feedback</h2>
      <p>Share your feedback to help us improve the application.</p>
    </div>

    <div class="feedback-card">

      <!-- <form > -->

        <fieldset [disabled]="true">

          <div class="row">

            <div class="col-md-3 mb-3">
              <label>Name</label>
              <input type="text" class="form-control" [(ngModel)]="user_name" name="name" />
            </div>

            <div class="col-md-3 mb-3">
              <label>Email</label>
              <input type="email" class="form-control" [(ngModel)]="email" name="email" />
            </div>

            <div class="col-md-3 mb-3">
              <label>Mobile</label>
              <input type="text" class="form-control" [(ngModel)]="mobile" name="mobile" />
            </div>

            <div class="col-md-3 mb-3">
              <label>User Type</label>
              <select class="form-control" [(ngModel)]="user_type" name="user_type">
                <option value="">Select</option>
                <option value="Admin">Admin</option>
                <option value="Maker">Maker</option>
                <option value="Viewer">Viewer</option>
              </select>
            </div>

          </div>

        </fieldset>

        <div class="row">
          <div class="col-12 mb-3">
            <label>Feedback Message</label>
            <textarea rows="6" class="form-control"
              [(ngModel)]="message"
              name="message"
              required>
            </textarea>
          </div>
        </div>

        <button class="btn btn-primary submit-btn" (click)="submitFeedback()" [disabled]="!message">
          Submit Feedback
        </button>

      <!-- </form> -->

    </div>

      </div>

    </div> -->

  </div>

</div>
