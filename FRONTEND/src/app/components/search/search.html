<div class="search-wrapper">
  <form class="search-shell" (ngSubmit)="submit()">
    <div class="search-input-wrap">
      <i class="bi bi-search search-icon" aria-hidden="true"></i>
      <input
        type="text"
        name="query"
        class="search-input"
        [placeholder]="placeholder"
        [disabled]="disabled"
        [ngModel]="query"
        (ngModelChange)="onQueryChange($event)"
        (keydown)="onKeyDown($event)"
        (focus)="onFocus()"
        (blur)="closeResults()"
        autocomplete="off"
      />

      <button
        *ngIf="query"
        type="button"
        class="icon-btn clear-btn"
        aria-label="Clear search"
        [disabled]="disabled"
        (click)="clear()"
      >
        <i class="bi bi-x-lg" aria-hidden="true"></i>
      </button>
    </div>

    <button
      type="submit"
      class="search-btn"
      [class.icon-only]="buttonMode === 'icon'"
      [disabled]="disabled"
      [attr.aria-label]="buttonMode === 'icon' ? buttonLabel : null"
    >
      <i *ngIf="buttonMode === 'icon'" class="bi bi-search" aria-hidden="true"></i>
      <span *ngIf="buttonMode !== 'icon'">{{ buttonLabel }}</span>
    </button>
  </form>

  <div class="search-results" *ngIf="stationSearch && query.trim()">
    <div *ngIf="isLoading" class="loading-state">
      <span class="spinner" aria-hidden="true"></span>
      <span>Searching stations...</span>
    </div>

    <div *ngIf="!isLoading && searchResults.length === 0" class="no-results">
      <div class="no-results-icon">
        <i class="bi bi-search" aria-hidden="true"></i>
      </div>
      <p>No stations found for "{{ query }}"</p>
      <small>Try station name or station code</small>
    </div>

    <div *ngIf="!isLoading && searchResults.length > 0" class="results-panel">
      <div class="results-count">
        Found {{ searchResults.length }} station{{ searchResults.length > 1 ? 's' : '' }}
      </div>

      <div class="results-list">
        <button
          *ngFor="let result of searchResults; let i = index; trackBy: trackResult"
          type="button"
          class="station-result-item"
          [class.selected]="i === selectedIndex"
          (click)="selectStation(result)"
          (mouseenter)="selectedIndex = i"
        >
          <div class="result-icon">
            <i class="bi bi-signpost-2-fill" aria-hidden="true"></i>
          </div>

          <div class="result-content">
            <div class="station-name">
              {{ getStationName(result) }}
              <span class="station-code" *ngIf="getStationCode(result)">({{ getStationCode(result) }})</span>
            </div>

            <div class="match-info">
              <span class="match-badge" [class.match-code]="result.matchType === 'code'">
                {{ result.matchType === 'code' ? 'Code' : 'Name' }} match
              </span>
              <span class="match-score">{{ result.score }}%</span>
            </div>

            <div class="station-location" *ngIf="getStationLocation(result)">
              {{ getStationLocation(result) }}
            </div>
          </div>
        </button>
      </div>
    </div>
  </div>
</div>
